name: Deploy MEAN App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    # Docker login
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build backend
    - name: Build backend image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest ./backend

    - name: Push backend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest

    # Build frontend
    - name: Build frontend image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest ./frontend

    - name: Push frontend
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest

    # SSH deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/mean-backend:latest
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/mean-frontend:latest
          sudo docker compose down
          sudo docker compose up -d


